<html lang="zh-CN">
<head>

<title>Augur v0.36 — UI 原型</title>
<style>
/* ============================================================
   CSS Custom Properties — Stripe-inspired dark theme
   ============================================================ */
:root {
  --bg-app:       #0d1117;
  --bg-sidebar:   #0a0e14;
  --bg-card:      #161b22;
  --bg-hover:     #1c2333;
  --bg-input:     #0d1117;
  --border:       #30363d;
  --border-light: #21262d;
  --text:         #c9d1d9;
  --text-dim:     #8b949e;
  --text-muted:   #6e7681;
  --accent:       #58a6ff;
  --accent-hover: #79b8ff;
  --accent-subtle: rgba(88,166,255,0.12);
  --green:        #3fb950;
  --green-subtle: rgba(63,185,80,0.12);
  --yellow:       #d2991d;
  --yellow-subtle:rgba(210,153,29,0.12);
  --red:          #f85149;
  --red-subtle:   rgba(248,81,73,0.12);
  --purple:       #a371f7;
  --pool-core:    #3fb950;
  --pool-watch:   #d2991d;
  --pool-alt:     #8b949e;
  --sidebar-w:    220px;
  --pool-w:       300px;
  --radius-sm:    6px;
  --radius-md:    8px;
  --radius-lg:    12px;
  --shadow-card:  0 1px 3px rgba(0,0,0,0.3);
  --font-mono:    'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  --font-sans:    -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

/* ============================================================
   Reset & Base
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-sans);
  font-size: 13px;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg-app);
  -webkit-font-smoothing: antialiased;
}

/* ============================================================
   App Shell — Three-column layout
   ============================================================ */
.app-shell {
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* ---- Sidebar (Column 1) ---- */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}
.sidebar-brand {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border-light);
}
.sidebar-brand .logo { font-size: 15px; font-weight: 700; color: var(--text); }
.sidebar-brand .version { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.sidebar-section {
  padding: 12px 0 4px;
}
.sidebar-label {
  padding: 0 16px 6px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
}
.sidebar-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 16px;
  margin: 1px 8px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--text-dim);
  transition: background 0.15s, color 0.15s;
  font-size: 13px;
  position: relative;
}
.sidebar-item:hover { background: var(--bg-hover); color: var(--text); }
.sidebar-item.active {
  background: var(--accent-subtle);
  color: var(--accent);
  font-weight: 500;
}
.sidebar-item .badge {
  margin-left: auto;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
  background: var(--bg-hover);
  color: var(--text-dim);
}
.sidebar-item.active .badge { background: rgba(88,166,255,0.2); color: var(--accent); }
.sidebar-item.disabled { opacity: 0.45; cursor: not-allowed; }
.sidebar-item.disabled:hover { background: transparent; color: var(--text-dim); }
.sidebar-spacer { flex: 1; }
.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border-light);
  font-size: 11px;
  color: var(--text-muted);
}
.sidebar-footer .status-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  margin-right: 4px; vertical-align: middle;
}
.sidebar-footer .status-dot.online { background: var(--green); }

/* ---- Stock Pool (Column 2) ---- */
.stock-pool {
  width: var(--pool-w);
  min-width: var(--pool-w);
  background: var(--bg-app);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.pool-header {
  padding: 12px 14px 8px;
  border-bottom: 1px solid var(--border-light);
  flex-shrink: 0;
}
.pool-title {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 8px;
}
.pool-filters {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.pool-filter {
  padding: 3px 9px;
  border-radius: var(--radius-sm);
  font-size: 11px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  transition: all 0.15s;
}
.pool-filter:hover { border-color: var(--text-dim); color: var(--text); }
.pool-filter.active { background: var(--accent-subtle); border-color: var(--accent); color: var(--accent); }
.pool-filter.core-filter.active { background: var(--green-subtle); border-color: var(--green); color: var(--green); }
.pool-filter.watch-filter.active { background: var(--yellow-subtle); border-color: var(--yellow); color: var(--yellow); }
.pool-list-wrap { flex: 1; overflow-y: auto; }
.pool-list { list-style: none; }
.pool-item {
  padding: 8px 14px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 0.1s, border-color 0.1s;
}
.pool-item:hover { background: var(--bg-hover); }
.pool-item.selected {
  background: var(--bg-card);
  border-left-color: var(--accent);
}
.pool-item .stock-rank { font-size: 10px; color: var(--text-muted); width: 18px; display: inline-block; }
.pool-item .stock-name { font-weight: 500; margin-right: 6px; }
.pool-item .stock-score { font-family: var(--font-mono); font-size: 13px; font-weight: 600; }
.pool-item .stock-code { font-size: 10px; color: var(--text-muted); display: block; margin-top: 1px; }
.pool-item .stock-meta { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
.pool-item .pool-tag {
  font-size: 9px; padding: 1px 6px; border-radius: 3px; font-weight: 500;
}
.pool-tag.core { background: var(--green-subtle); color: var(--green); }
.pool-tag.watch { background: var(--yellow-subtle); color: var(--yellow); }
.pool-tag.alt { background: var(--bg-hover); color: var(--text-dim); }
.pool-item .score-bar-wrap {
  height: 3px; background: var(--bg-hover); border-radius: 2px; margin-top: 4px; overflow: hidden;
}
.pool-item .score-bar-fill {
  height: 100%; border-radius: 2px; transition: width 0.3s;
}
.pool-item .score-bar-fill.alt  { background: var(--text-dim); }
.pool-item .score-bar-fill.watch { background: var(--yellow); }
.pool-item .score-bar-fill.core { background: var(--green); }
.pool-footer {
  padding: 10px 14px;
  border-top: 1px solid var(--border-light);
  font-size: 11px;
  color: var(--text-muted);
  flex-shrink: 0;
}
.pool-footer .summary-line { margin-bottom: 4px; }
.pool-footer .summary-line span { color: var(--text-dim); font-weight: 500; }
.pool-footer .actions { display: flex; gap: 8px; margin-top: 6px; }
.pool-footer .btn-sm {
  padding: 4px 10px;
  font-size: 11px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
}
.pool-footer .btn-sm:hover { border-color: var(--text-dim); color: var(--text); }
.pool-footer .btn-sm.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.pool-footer .btn-sm.primary:hover { background: var(--accent-hover); }

/* ---- Main Content (Column 3) ---- */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* Top Bar */
.topbar {
  height: 48px;
  min-height: 48px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-app);
}
.topbar .breadcrumb { font-size: 12px; color: var(--text-dim); }
.topbar .breadcrumb span { color: var(--text); font-weight: 500; }
.topbar .topbar-right { margin-left: auto; display: flex; gap: 8px; }
.topbar .btn-ghost {
  padding: 5px 12px;
  font-size: 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
}
.topbar .btn-ghost:hover { border-color: var(--text-dim); color: var(--text); }

/* Content Area */
.content-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}
.content-scroll.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty-title { font-size: 16px; color: var(--text-dim); margin-bottom: 6px; }
.empty-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }
.empty-actions { display: flex; gap: 8px; }
.recent-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-top: 24px; max-width: 600px; width: 100%; }
.recent-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 12px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.recent-card:hover { border-color: var(--accent); }
.recent-card .rc-name { font-weight: 500; font-size: 13px; }
.recent-card .rc-score { font-family: var(--font-mono); font-size: 18px; font-weight: 700; margin: 4px 0; }
.recent-card .rc-meta { font-size: 10px; color: var(--text-muted); }

/* Data overview (KPI + Summary) */
.data-overview {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 16px;
  margin-bottom: 20px;
}

/* Source Data Summary Card */
.summary-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px;
}
.summary-card .card-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 12px;
}
.summary-meta {
  font-size: 11px; color: var(--text-muted); margin-bottom: 12px;
  display: flex; gap: 16px; flex-wrap: wrap;
}
.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.summary-item {
  background: var(--bg-app);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
}
.summary-item .si-label { font-size: 10px; color: var(--text-muted); margin-bottom: 3px; }
.summary-item .si-value { font-family: var(--font-mono); font-size: 15px; font-weight: 600; }
.summary-item .si-sub { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
.si-sub.up { color: var(--green); }
.si-sub.down { color: var(--red); }
.si-sub.neutral { color: var(--text-dim); }
.summary-divider {
  margin-top: 12px; padding-top: 10px;
  border-top: 1px solid var(--border-light);
  font-size: 11px; color: var(--text-dim);
  display: flex; gap: 20px;
}
.summary-divider span { color: var(--text-muted); }
.summary-divider .val { font-weight: 500; color: var(--text-dim); }

/* KPI Cards */
.kpi-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto auto;
  gap: 8px;
  align-content: start;
}
.kpi-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
}
.kpi-card .kpi-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
.kpi-card .kpi-value { font-family: var(--font-mono); font-size: 22px; font-weight: 700; line-height: 1.1; }
.kpi-card .kpi-sub { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
.kpi-bar-wrap { height: 3px; background: var(--bg-app); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.kpi-bar-fill { height: 100%; border-radius: 2px; }
.kpi-bar-fill.green { background: var(--green); }
.kpi-bar-fill.yellow { background: var(--yellow); }
.kpi-bar-fill.red { background: var(--red); }
.kpi-bar-fill.accent { background: var(--accent); }
.kpi-badge {
  display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 600;
  margin-top: 4px; align-self: flex-start;
}
.kpi-badge.green { background: var(--green-subtle); color: var(--green); }
.kpi-badge.yellow { background: var(--yellow-subtle); color: var(--yellow); }
.kpi-badge.red { background: var(--red-subtle); color: var(--red); }

/* Report Tabs */
.report-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.report-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.report-tab {
  padding: 10px 16px;
  font-size: 12px;
  color: var(--text-dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  white-space: nowrap;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}
.report-tab:hover { color: var(--text); }
.report-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.report-body {
  padding: 20px;
  max-height: 700px;
  overflow-y: auto;
  font-size: 13px;
  line-height: 1.8;
}
.report-body h2 { font-size: 16px; margin-bottom: 12px; color: var(--text); }
.report-body h3 { font-size: 14px; margin: 16px 0 8px; color: var(--text-dim); }
.report-body p { margin-bottom: 8px; color: var(--text-dim); }
.report-body strong { color: var(--text); }
.report-body .highlight-box {
  background: var(--bg-app);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  margin: 10px 0;
  font-family: var(--font-mono);
  font-size: 12px;
}
.report-body .tag-ok { color: var(--green); }
.report-body .tag-warn { color: var(--yellow); }
.report-body .tag-issue { color: var(--red); }
.report-body .tag-info { color: var(--accent); }

/* Responsive adjustments */
@media (max-width: 1200px) {
  .data-overview { grid-template-columns: 1fr; }
  .kpi-grid { grid-template-columns: repeat(3,1fr); grid-template-rows: auto auto; }
}
</style>
</head>

// ============================================================
// RENDER: Stock pool list
// ============================================================
function getPoolClass(pool) {
  if (pool === 'core') return 'core';
  if (pool === 'watch') return 'watch';
  return 'alt';
}
function getPoolLabel(pool) {
  if (pool === 'core') return '核心';
  if (pool === 'watch') return '观察';
  return '备选';
}
function getScoreColor(final) {
  if (final >= 75) return 'var(--green)';
  if (final >= 50) return 'var(--yellow)';
  return 'var(--text-dim)';
}

let activePoolFilter = 'all';

function renderPoolList() {
  const list = document.getElementById('poolList');
  const filtered = activePoolFilter === 'all' ? stocks : stocks.filter(s => s.pool === activePoolFilter);
  list.innerHTML = filtered.map(s => {
    const poolClass = getPoolClass(s.pool);
    const poolLabel = getPoolLabel(s.pool);
    const scoreColor = getScoreColor(s.final);
    return `
      <li class="pool-item" data-code="${s.code.replace(/\.\w+$/, '')}" onclick="selectStock('${s.code.replace(/\.\w+$/, '')}')">
        <span class="stock-rank">${s.rank}</span>
        <span class="stock-name">${s.name}</span>
        <span class="stock-score" style="color:${scoreColor}">${s.final.toFixed(1)}</span>
        <span class="stock-code">${s.code}</span>
        <div class="stock-meta">
          <span class="pool-tag ${poolClass}">${poolLabel}</span>
        </div>
        <div class="score-bar-wrap">
          <div class="score-bar-fill ${poolClass}" style="width:${s.final}%"></div>
        </div>
      </li>
    `;
  }).join('');
}

      <!-- Data overview -->

        <!-- Source data summary -->

          <div class="card-title">源核心数据摘要</div>

              <div class="si-sub ${s.roe.cls}">${s.roe.sub}</div>

              <span style="color:var(--text-muted)">${data.cv.uncertain}?</span>

            <div class="kpi-sub">共 ${data.cv.total} 条声明</div>

// ============================================================
// EVENT: Select stock
// ============================================================
let currentCode = null;

function selectStock(code) {
  currentCode = code;
  const stock = stocks.find(s => s.code.replace(/\.\w+$/, '') === code);
  const name = stock ? stock.name : code;

  // Update breadcrumb
  document.getElementById('breadcrumb').innerHTML = `Augur / <span>${name} ${code}</span>`;

  // Update pool list selection
  document.querySelectorAll('.pool-item').forEach(el => el.classList.remove('selected'));
  const target = document.querySelector(`.pool-item[data-code="${code}"]`);
  if (target) target.classList.add('selected');

  // Render analysis content
  const contentArea = document.getElementById('contentArea');
  contentArea.outerHTML = renderAnalysisContent(code);

  // Re-bind tab switching
  bindReportTabs(code);

  // Remove empty-state class from main content if present
  const mc = document.getElementById('mainContent');
  mc.querySelector('.content-scroll')?.classList.remove('empty-state');
}

function bindReportTabs(code) {
  document.querySelectorAll('#reportTabs .report-tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('#reportTabs .report-tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      const tabKey = this.dataset.tab;
      const data = reportData[code];
      if (data && data.tabs[tabKey]) {
        document.getElementById('reportBody').innerHTML = data.tabs[tabKey];
      }
    });
  });
}

// ============================================================
// EVENT: Pool filters
// ============================================================
document.querySelectorAll('#poolFilters .pool-filter').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('#poolFilters .pool-filter').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    activePoolFilter = this.dataset.pool;
    renderPoolList();
    // Re-select current stock if still visible
    if (currentCode) {
      const target = document.querySelector(`.pool-item[data-code="${currentCode}"]`);
      if (target) target.classList.add('selected');
    }
  });
});

// ============================================================
// EVENT: Sidebar navigation
// ============================================================
document.querySelectorAll('.sidebar-item:not(.disabled)').forEach(item => {
  item.addEventListener('click', function() {
    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    this.classList.add('active');
  });
});

// ============================================================
// INIT
// ============================================================
renderPoolList();
