# 龟龟策略常量配置 v0.23
# 核心变更: L3 十二维商业模式评估(加法,0-30pt) / L5 纯估值安全边际(0-25pt)
# 公式: Final = L3 + L4 + L5 = 100pt

# =====================================================================
# 一、Owners' Earnings — 单路径计算
# =====================================================================
owners_earnings:
  cashflow_path:
    formula: "net_operating_cf - (purchase_fixed_assets * maintenance_coefficient)"
    role: "OE质量验证的输入，取5年中位数"

  maintenance_capex_coefficient:
    prior_weight: 0.4
    asset_intensity_weight: 0.6
    fallback: "数据不足时使用行业先验 100% 权重"

    industry_priors:
      consumer_staples: 0.45
      consumer_discretionary: 0.50
      healthcare: 0.45
      utility: 0.70
      industrial: 0.60
      materials: 0.60
      energy: 0.75
      technology: 0.55
      real_estate: 0.40
      telecom: 0.70
      default: 0.60

    asset_intensity_indicators:
      capex_to_revenue:
        formula: "购建固定资产无形资产支付的现金 / 营业总收入 (5年均值)"
        scoring:
          light:   { max: 3,    score: 0.35 }
          medium:  { min: 3,    max: 8,  score: 0.55 }
          heavy:   { min: 8,    score: 0.75 }
      fixed_asset_turnover:
        formula: "营业总收入 / 固定资产净值"
        scoring:
          light:   { min: 5,    score: 0.35 }
          medium:  { min: 2,    max: 5,  score: 0.55 }
          heavy:   { max: 2,    score: 0.75 }
      depreciation_to_revenue:
        formula: "折旧 / 营业总收入 (5年均值)"
        scoring:
          light:   { max: 2,    score: 0.35 }
          medium:  { min: 2,    max: 5,  score: 0.55 }
          heavy:   { min: 5,    score: 0.75 }

  quality_label:
    description: "OE质量标签在PR计算前生效"
    trusted:
      label: "🟢 可信"
      condition: "OE_cf/净利润 ≥ 0.8 AND OE_cf CV ≤ 0.3"
      action: "正常使用 OE_cf 计算 PR"
    questionable:
      label: "🟡 存疑"
      condition: "(0.5 ≤ OE_cf/净利润 < 0.8) OR (0.3 < OE_cf CV ≤ 0.5)"
      action: "正常计算 PR，但 L4 得分 × 0.7"
    unreliable:
      label: "🔴 不可靠"
      condition: "OE_cf/净利润 < 0.5 OR OE_cf CV > 0.5"
      action: "不使用 PR，L4 = 0"

  quality_checks:
    oe_to_profit_ratio:
      description: "OE_cf/净利润 5年中位数"
      thresholds:
        - { min: 0.8,  penalty: 0 }
        - { min: 0.5,  max: 0.8, penalty: 3 }
        - { max: 0.5,  penalty: 5,  red_flag: true }

    oe_stability:
      description: "OE_cf变异系数(std/mean × 100%)"
      thresholds:
        - { max: 0.3,  penalty: 0 }
        - { min: 0.3,  max: 0.5, penalty: 2 }
        - { min: 0.5,  penalty: 4 }

    oe_trend:
      description: "近3年OE_cf CAGR"
      thresholds:
        - { min: 0,    penalty: 0 }
        - { max: 0,    penalty: 3 }

    bs_consistency:
      description: "Σ5年OE_cf vs 5年净现金变化差异"
      threshold_pct: 30
      penalty: 3
      logic: |
        累积OE_5年 = sum(每年OE_cf)
        净现金变化_5年 = (现金_now - 有息负债_now) - (现金_5年前 - 有息负债_5年前)
        不可解释差异 = 累积OE_5年 - 净现金变化_5年 - 分红总额 - 回购总额
        如果 不可解释差异 / 累积OE_5年 > 30% → 扣3分

# =====================================================================
# 二、穿透回报率 — v0.23 L4 (0-45pt)
# =====================================================================
penetration_return:
  formula: "(disposable_cash * distribution_ratio + buyback_cancellation) / latest_market_cap"
  disposable_cash_formula: "经营CF净额 - 维持性CAPEX - 并购子公司 - max(0,年末长投-年初长投) - 财务费用 + 货币资金 - 限制性货币 - 短期借款 + 交易性金融资产"

  distribution_ratio:
    tier1:
      source: "公告分红承诺"
      formula: "承诺值（原值，不折旧）"
      search_keywords: ["分红承诺", "股东回报规划", "未来三年股东分红回报规划"]
    tier2:
      source: "历史分红/净利润算术平均"
      formula: "mean(近5年 年度分红总额 / 年度净利润)"
      note: "v0.22: 从 median(分红/DC)*0.7 改为 mean(分红/净利润)，消除循环依赖"

  buyback:
    source: "Web搜索+LLM提取 + Tushare降级"
    filter: "仅确认用于注销的回购"
    search_keywords: ["回购注销", "回购股份注销", "减少注册资本"]

  thresholds:
    - { min: 12.0,  starting_score: 20, label: "优秀" }
    - { min: 8.0,   starting_score: 15, label: "良好" }
    - { min: 5.0,   starting_score: 10, label: "及格" }
    - { max: 5.0,   starting_score: 0,  label: "不及格", action: "L4=0" }

  max_score: 45  # v0.23: 40→45

  philosophy: |
    穿透回报率回答：「以当前市值买入，当前经营能力带来的回报率是多少？」
    v0.23: L4 权重从 40→45pt，在百分制中占 45%。
    PR 数学公式不变，只缩放输出。

# =====================================================================
# 三、L3 商业模式评估 — v0.23 十二维加法 (0-30pt)
# =====================================================================
business_model:
  max_score: 30
  max_dim_score: 24  # 12维 × 每维 max 2pt

  # 12 维度定义
  dimensions:
    # ── 组一：盈利能力与质量 (5维) ──
    - id: "roe_level"
      name: "ROE水平"
      group: "盈利能力"
      description: "最新年报ROE(年化值)"
      thresholds:
        - { min: 20, score: 2, label: "优秀 ≥20%" }
        - { min: 15, score: 1, label: "良好 ≥15%" }
        - { max: 15, score: 0, label: "<15%" }

    - id: "roe_stability"
      name: "ROE稳定性"
      group: "盈利能力"
      description: "近5年ROE变异系数(CV=std/mean)"
      thresholds:
        - { max: 0.25, score: 2, label: "极稳 CV≤0.25" }
        - { min: 0.25, max: 0.50, score: 1, label: "一般 0.25<CV≤0.50" }
        - { min: 0.50, score: 0, label: "波动大 CV>0.50" }

    - id: "roic_roe_gap"
      name: "ROIC-ROE差距"
      group: "盈利能力"
      description: "|ROIC - ROE|，差距小说明ROE不靠杠杆吹"
      thresholds:
        - { max: 5, score: 2, label: "差距≤5pp" }
        - { min: 5, max: 10, score: 1, label: "5~10pp" }
        - { min: 10, score: 0, label: ">10pp 高杠杆嫌疑" }

    - id: "gross_margin_level"
      name: "毛利率水平"
      group: "盈利能力"
      description: "最新年报毛利率"
      thresholds:
        - { min: 40, score: 2, label: "优秀 ≥40%" }
        - { min: 30, score: 1, label: "良好 ≥30%" }
        - { max: 30, score: 0, label: "<30%" }

    - id: "gross_margin_stability"
      name: "毛利率稳定性"
      group: "盈利能力"
      description: "近5年毛利率变异系数"
      thresholds:
        - { max: 0.15, score: 2, label: "极稳 CV≤0.15" }
        - { min: 0.15, max: 0.30, score: 1, label: "一般 0.15<CV≤0.30" }
        - { min: 0.30, score: 0, label: "波动大 CV>0.30" }

    # ── 组二：成熟度/扩张意愿 (3维) ──
    - id: "capex_to_operating_cf"
      name: "CAPEX/经营CF"
      group: "成熟度"
      description: "近5年(CAPEX÷经营CF)均值，≤40%说明不烧钱扩张"
      thresholds:
        - { max: 40, score: 2, label: "保守 ≤40%" }
        - { min: 40, max: 70, score: 1, label: "一般 40~70%" }
        - { min: 70, score: 0, label: "冒进 >70%" }

    - id: "total_assets_cagr"
      name: "总资产增速"
      group: "成熟度"
      description: "近5年总资产CAGR，≤10%说明没在大并购/建厂"
      thresholds:
        - { max: 10, score: 2, label: "稳健 ≤10%" }
        - { min: 10, max: 20, score: 1, label: "中速 10~20%" }
        - { min: 20, score: 0, label: "快速扩张 >20%" }

    - id: "revenue_cagr"
      name: "营收增速"
      group: "成熟度"
      description: "近3年营收CAGR，0~15%为成熟现金牛区间"
      thresholds:
        - { min: 0, max: 15, score: 2, label: "成熟 0~15%" }
        - { min: 15, max: 25, score: 1, label: "成长期 15~25%" }
        - { min: 25, score: 0, label: "高速扩张 >25%" }
        - { max: 0, score: 0, label: "负增长" }

    # ── 组三：资本配置纪律 (2维) ──
    - id: "dividend_consistency"
      name: "分红持续性"
      group: "资本纪律"
      description: "近5年每年payout≥30%且均值≥40%，稳定回馈股东"
      thresholds:
        - { condition: "all_years_30_mean_40", score: 2, label: "持续分钱" }
        - { condition: "mean_payout_30", score: 1, label: "有分红" }
        - { condition: "fail", score: 0, label: "不分/不稳定" }

    - id: "share_count_trend"
      name: "股本变动"
      group: "资本纪律"
      description: "近5年总股本变化率≤0%=不摊薄/回购注销"
      thresholds:
        - { max: 0, score: 2, label: "不摊薄/回购" }
        - { min: 0, max: 5, score: 1, label: "轻微摊薄 <5%" }
        - { min: 5, score: 0, label: "明显摊薄 ≥5%" }

    # ── 组四：治理 (2维) ──
    - id: "management_stability"
      name: "管理层稳定性"
      group: "治理"
      description: "管理层长期稳定，无频繁变更"
      thresholds:
        - { condition: "stable", score: 2, label: "稳定" }
        - { condition: "data_unavailable", score: 1, label: "数据不足" }
        - { condition: "frequent_change", score: 0, label: "频繁变更" }

    - id: "earnings_authenticity"
      name: "盈利真实性"
      group: "治理"
      description: "近3年经营CF/净利润最小值，≥0.6=利润含金量够"
      thresholds:
        - { min: 0.8, score: 2, label: "含金量高 ≥0.8" }
        - { min: 0.6, score: 1, label: "及格 ≥0.6" }
        - { max: 0.6, score: 0, label: "含金量不足 <0.6" }

  levels:
    excellent: { min: 20, label: "优", description: "生意基因无瑕疵" }
    good: { min: 14, label: "良", description: "大多数维度达标" }
    medium: { min: 8, label: "中", description: "有显著瑕疵" }
    poor: { max: 7, label: "差", description: "基因缺陷明显" }

# =====================================================================
# 四、安全边际 — v0.23 纯估值保护 (0-25pt)
# =====================================================================
margin_of_safety:
  max_score: 25

  # 折现率: 无风险利率(~1.7%) + 股权溢价(2%) + 个股风险溢价(~3.3%) ≈ 7%
  discount_rate: 0.07
  discount_rate_logic: "max(无风险利率+2%, 5%) + 个股风险溢价 2%"

  # 4.1 估值安全边际率 (0-15分)
  valuation_safety_margin:
    max_score: 15
    formula: "合理市值 = (DC × 分配比率 + 回购注销) / 折现率"
    thresholds:
      - { min: 50,  score: 15, label: "五折买·极度安全" }
      - { min: 30,  max: 50, score: 12, label: "七折买·很安全" }
      - { min: 15,  max: 30, score: 8,  label: "八五折买·合理" }
      - { min: 0,   max: 15, score: 4,  label: "接近合理" }
      - { max: 0,   score: 0,  label: "溢价买入" }

  # 4.2 下行风险缓冲 (0-5分)
  downside_buffer:
    max_score: 5
    items:
      - id: "asset_floor"
        name: "资产底价"
        metric: "(货币资金+交易金融资产-总负债) / 市值"
        thresholds:
          - { min: 50, score: 2, label: "清算支撑强" }
          - { min: 20, score: 1, label: "有一定支撑" }
          - { max: 20, score: 0, label: "支撑薄弱" }

      - id: "dividend_anchor"
        name: "股息托底"
        metric: "当前股息率 ≥ 历史中位数 × 0.8"
        thresholds:
          - { condition: true,  score: 1, label: "股息有托底" }
          - { condition: false, score: 0, label: "股息在低位" }

      - id: "buyback_support"
        name: "回购支撑"
        metric: "回购注销金额 > 0"
        thresholds:
          - { condition: true,  score: 2, label: "有回购注销" }
          - { condition: false, score: 0, label: "无回购" }

  # 4.3 仓位矩阵（由安全边际率单维驱动）
  position_matrix:
    thresholds:
      - { min: 30,  position_pct: 15, score: 5, label: "15%" }
      - { min: 15,  position_pct: 10, score: 3, label: "10%" }
      - { min: 0,   position_pct: 5,  score: 2, label: "5%" }
      - { max: 0,   position_pct: 0,  score: 0, label: "0%" }

# =====================================================================
# 五、打分模型 — v0.23 加法百分制
# =====================================================================
scoring:
  formula: "Final = L3_30pt + L4_45pt + L5_25pt = 100pt"
  max_raw: 100
  max_final: 100

  pools:
    core: 75    # ≥75 核心池
    watch: 50   # 50~74 观察池
                 # <50 备选池

# =====================================================================
# 六、分红率计算
# =====================================================================
dividend:
  source_interface: "tushare: dividend"
  calculation: "每股派息(cash_div) / EPS"
  lookback_years: 5
  aggregation: "中位数"

  gates:
    high:            { min: 50, warning: "需要验证可持续性" }
    normal:          { min: 30, max: 50 }
    low:             { min: 20, max: 30, action: "安全边际得分打7折" }
    very_low:        { min: 0, max: 20, action: "标记'低分红'" }

  sustainability_checks:
    payout_to_operating_cf:   { threshold: 80,  warning: "分红/经营现金流>80%，可能借钱分红" }
    payout_to_net_profit:     { threshold: 70,  warning: "分红/净利润>70%，无法留存再投资" }
    payout_sudden_jump:       { description: "分红率突然从30%跳升到80%→检查是否大股东套现" }

# =====================================================================
# 七、SOTP 双口径
# =====================================================================
sotp:
  divergence_threshold: 2.0

# =====================================================================
# 八、税率默认值
# =====================================================================
tax:
  corporate_income_tax: 0.25
  dividend_withholding: 0.0

# =====================================================================
# 九、公司分类与策略分流
# =====================================================================
company_classification:
  eligible:
    - STANDARD_CONSUMER
    - HOLDING_COMPANY
  excluded:
    - id: CYCLICAL
      name: "强周期"
      reason: "利润波动剧烈，穿透回报率在周期顶部/底部完全失真"
    - id: FINANCIAL
      name: "金融类"
      reason: "资产负债表结构与其他行业完全不同"
    - id: GROWTH_NO_DIVIDEND
      name: "成长不分配"
      reason: "股息率为0，安全边际模型依赖分红折现"
